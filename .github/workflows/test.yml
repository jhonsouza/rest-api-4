name: Tag test

on:
  workflow_call:
    outputs:
      changes_found:
        description: 'Changes found in IaC directory'
        value: ${{ jobs.check-iac-changes.outputs.changes_found }}
    inputs:
      target_branch:
        description: 'Target branch to check for changes'
        type: string
        required: true

jobs:
  check-iac-changes:
    name: Check Changes in IaC Directory
    runs-on: ubuntu-latest
    outputs:
      changes_found: ${{ steps.check-iac-changes.outputs.changes_found }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target_branch }}
          token: ${{ secrets.GIT_TOKEN }}
          # Shallow clone (default depth 1) does not fetch tag refs; git tag stays empty/incomplete.
          fetch-depth: 0
      - name: Check changes in IaC directory
        id: check-iac-changes
        run: |
          read currentTag previousTag <<< "$(git tag --sort=-creatordate | grep v | head -n 2 | tr '\n' ' ')"
          if [ -z "$previousTag" ]; then
            echo "no previous tag found"
            echo "changes_found=true" >> $GITHUB_OUTPUT
          elif git diff $currentTag $previousTag --quiet -- .stack ; then
            echo "no changes found in IaC directory"
            echo "changes_found=false" >> $GITHUB_OUTPUT
          else
            echo "changes found in IaC directory"
            echo "changes_found=true" >> $GITHUB_OUTPUT
          fi
